<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Fome Zero</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #f1f5f9; color: #1e293b; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { font-size: 1.3rem; margin-bottom: 15px; color: #0f172a; text-align: center; font-weight: 800; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #475569; margin-bottom: 4px; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: #f8fafc; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; font-size: 0.9rem; outline: none; }
        button { width: 100%; background: #dc2626; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; cursor: pointer; margin-top: 10px; }
        
        /* DESIGN DOS SLOTS DA GALERIA */
        .upload-secao { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .box-capa { width: 100%; height: 100px; background: #e2e8f0; border-radius: 8px; margin-bottom: 10px; object-fit: cover; }
        .wrapper-logo { position: relative; margin-top: -50px; margin-bottom: 10px; display: flex; justify-content: center; }
        .circulo-logo { width: 80px; height: 80px; background: #cbd5e1; border-radius: 50%; border: 3px solid white; object-fit: cover; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-galeria { background: #e2e8f0; color: #475569; font-size: 0.8rem; padding: 6px 12px; border-radius: 6px; display: inline-block; cursor: pointer; font-weight: 600; margin-top: 5px; border: 1px solid #cbd5e1; }
        
        .card-produto { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-status { padding: 6px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; width: auto; margin: 0; }
        .btn-status.aberto { background: #dcfce7; color: #15803d; }
        .btn-status.fechado { background: #fee2e2; color: #b91c1c; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
</head>
<body>

    <div class="container" id="painel-conteudo">
        <h2>🔑 Acesso ao Painel</h2>
        <div class="form-group"><label>Usuário:</label><input type="text" id="user" value="admin"></div>
        <div class="form-group"><label>Senha:</label><input type="password" id="pass" value="admin123"></div>
        <button onclick="verificarLogin()">Entrar no Painel</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lojaId = urlParams.get('loja') || urlParams.get('Loja') || urlParams.get('LOJA');

        function verificarLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u === "admin" && p === "admin123") {
                carregarPainel();
            } else {
                alert("Usuário ou senha incorretos.");
            }
        }

        function carregarPainel() {
            if(!lojaId) {
                alert("Falta o identificador da loja no link!");
                return;
            }

            document.getElementById('painel-conteudo').innerHTML = `
                <h2>⚙️ Configuração da Loja</h2>
                
                <button id="btn-toggle-loja" class="btn-status" onclick="alternarStatusLoja()">Carregando status...</button>
                <hr style="margin:15px 0; border:0; border-top:1px solid #e2e8f0;">

                <div class="upload-secao">
                    <label>Imagem de Capa (Retangular)</label>
                    <img id="visualizar-capa" src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" class="box-capa">
                    <label class="btn-galeria">
                        <i class="fa-solid fa-image"></i> Escolher Capa da Galeria
                        <input type="file" accept="image/*" style="display:none;" onchange="uploadImagemGaleria(this, 'capa', 800, 400)">
                    </label>

                    <div class="wrapper-logo">
                        <img id="visualizar-logo" src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=150" class="circulo-logo">
                    </div>
                    <label>Logo da Loja (Redonda)</label><br>
                    <label class="btn-galeria">
                        <i class="fa-solid fa-camera"></i> Escolher Logo da Galeria
                        <input type="file" accept="image/*" style="display:none;" onchange="uploadImagemGaleria(this, 'logo', 300, 300)">
                    </label>
                </div>

                <div class="form-group"><label>Nome do Estabelecimento:</label><input type="text" id="loja-nome"></div>
                <div class="form-group"><label>WhatsApp (Com DDD, apenas números):</label><input type="text" id="loja-whats" placeholder="Ex: 5511999999999"></div>
                <div class="form-group"><label>Taxa de Entrega Centro (R$):</label><input type="number" step="0.01" id="loja-taxa-c"></div>
                <div class="form-group"><label>Taxa de Entrega Outros Bairros (R$):</label><input type="number" step="0.01" id="loja-taxa-b"></div>
                <button style="background:#10b981;" onclick="salvarConfiguracoesBase()">💾 Salvar Dados Principais</button>

                <h2 style="margin-top:30px; border-top:2px solid #f1f5f9; padding-top:15px;">➕ Adicionar Produto</h2>
                <div class="form-group"><label>Nome do Item:</label><input type="text" id="p-nome"></div>
                <div class="form-group"><label>Categoria:</label><input type="text" id="p-cat" placeholder="Ex: Hambúrgueres, Bebidas"></div>
                <div class="form-group"><label>Descrição/Ingredientes:</label><textarea id="p-desc"></textarea></div>
                <div class="form-group"><label>Preço (R$):</label><input type="number" step="0.01" id="p-preco"></div>
                <button onclick="adicionarNovoProduto()">Adicionar ao Cardápio</button>

                <h2 style="margin-top:20px;">📦 Seus Produtos</h2>
                <div id="lista-produtos-painel"></div>
            `;

            ouvirDadosFirebase();
        }

        let estadoLojaAberta = true;
        let listaProdutosGlobal = [];

        function ouvirDadosFirebase() {
            database.ref('lojas/' + lojaId + '/loja').on('value', (snapshot) => {
                const dados = snapshot.val() || {};
                document.getElementById('loja-nome').value = dados.nome || "";
                document.getElementById('loja-whats').value = dados.whatsapp || "";
                document.getElementById('loja-taxa-c').value = dados.taxaCentro || 0;
                document.getElementById('loja-taxa-b').value = dados.taxaBairro || 0;
                
                if (dados.capa) document.getElementById('visualizar-capa').src = dados.capa;
                if (dados.logo) document.getElementById('visualizar-logo').src = dados.logo;

                estadoLojaAberta = dados.aberta !== false;
                const btnStatus = document.getElementById('btn-toggle-loja');
                if(estadoLojaAberta) {
                    btnStatus.className = "btn-status aberto"; btnStatus.innerText = "🟢 LOJA ABERTA (Clique para Fechar)";
                } else {
                    btnStatus.className = "btn-status fechado"; btnStatus.innerText = "🔴 LOJA FECHADA (Clique para Abrir)";
                }
            });

            database.ref('lojas/' + lojaId + '/produtos').on('value', (snapshot) => {
                listaProdutosGlobal = snapshot.val() || [];
                const container = document.getElementById('lista-produtos-painel');
                container.innerHTML = '';
                listaProdutosGlobal.forEach((p, idx) => {
                    if(p && p.ativo) {
                        container.innerHTML += `
                            <div class="card-produto">
                                <div><strong>${p.nome}</strong><br><span style="font-size:0.8rem; color:#64748b;">${p.cat} - R$ ${p.preco.toFixed(2)}</span></div>
                                <button style="width:auto; padding:6px 10px; background:#ef4444; margin:0;" onclick="deletarProduto(${idx})">✕</button>
                            </div>
                        `;
                    }
                });
            });
        }

        function alternarStatusLoja() {
            database.ref('lojas/' + lojaId + '/loja/aberta').set(!estadoLojaAberta);
        }

        function salvarConfiguracoesBase() {
            const nome = document.getElementById('loja-nome').value.trim();
            const whatsapp = document.getElementById('loja-whats').value.trim();
            const taxaCentro = parseFloat(document.getElementById('loja-taxa-c').value) || 0;
            const taxaBairro = parseFloat(document.getElementById('loja-taxa-b').value) || 0;

            database.ref('lojas/' + lojaId + '/loja').update({
                nome, whatsapp, taxaCentro, taxaBairro
            }).then(() => alert("Dados salvos com sucesso!"));
        }

        // CONVERSOR DA GALERIA DO CELULAR COM COMPRESSÃO
        function uploadImagemGaleria(input, tipoDestino, maxWidth, maxHeight) {
            if (input.files && input.files[0]) {
                const arquivo = input.files[0];
                const leitor = new FileReader();
                
                leitor.onload = function(e) {
                    const imagemTemporaria = new Image();
                    imagemTemporaria.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = imagemTemporaria.width;
                        let height = imagemTemporaria.height;

                        if (width > height) {
                            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else {
                            if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                        }

                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(imagemTemporaria, 0, 0, width, height);
                        
                        // Transforma a foto em texto leve (Base64) com 70% de qualidade
                        const fotoFinalBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        
                        // Atualiza a pré-visualização no celular do usuário
                        document.getElementById('visualizar-' + tipoDestino).src = fotoFinalBase64;

                        // Grava diretamente no Firebase
                        database.ref('lojas/' + lojaId + '/loja/' + tipoDestino).set(fotoFinalBase64)
                            .then(() => alert('Sua foto de ' + tipoDestino + ' foi enviada e atualizada!'));
                    };
                    imagemTemporaria.src = e.target.result;
                };
                leitor.readAsDataURL(arquivo);
            }
        }

        function adicionarNovoProduto() {
            const nome = document.getElementById('p-nome').value.trim();
            const cat = document.getElementById('p-cat').value.trim();
            const desc = document.getElementById('p-desc').value.trim();
            const preco = parseFloat(document.getElementById('p-preco').value) || 0;

            if(!nome || !cat || preco <= 0) { alert("Preencha o nome, categoria e preço válido."); return; }

            const novoProd = { nome, cat, desc, preco, ativo: true, foto: "" };
            listaProdutosGlobal.push(novoProd);

            database.ref('lojas/' + lojaId + '/produtos').set(listaProdutosGlobal).then(() => {
                alert("Item adicionado!");
                document.getElementById('p-nome').value = '';
                document.getElementById('p-desc').value = '';
                document.getElementById('p-preco').value = '';
            });
        }

        function deletarProduto(idx) {
            if(confirm("Deseja mesmo remover esse item do cardápio?")) {
                listaProdutosGlobal[idx].ativo = false;
                database.ref('lojas/' + lojaId + '/produtos').set(listaProdutosGlobal);
            }
        }
    </script>
</body>
</html>
